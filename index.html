<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Allen Deng Support Page</title>
    <style>
        body {
            background-color: #000000; 
            color: #ffffff;
            font-family: 'Microsoft JhengHei';
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #04f008; 
            font-size: 50px;
            margin-bottom: 10px;
        }

        .card {
            background: #000000;
            border: 1px solid #04f008;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            text-align: center;
            transition: transform 0.1s;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-1px, -1px) rotate(1deg); }
            80% { transform: translate(-3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .shaking {
            animation: shake 0.15s linear;
        }

        .image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #04f008;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .quote {
            font-style: italic;
            font-size: 20px;
            color: #ecf0f1;
            line-height: 1.6;
            margin: 20px 0;
        }

        .counter {
            font-size: 1.8rem;
            color: #04f008;
            margin: 10px 0;
            font-weight: bold;
        }

        .input-group {
            margin: 20px 0;
        }

        input[type="email"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #04f008;
            background: #222;
            color: white;
            width: 80%;
            outline: none;
        }

        .message {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }

        .btn {
            margin-top: 20px;
            background: transparent;
            color: #04f008;
            border: 2px solid #04f008;
            padding: 10px 25px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 20px;
        }

        .btn:hover {
            background: #04f008;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <h1>鄧倫應援站</h1>
    
    <div class="card" id="mainCard">
        <img src="鄧倫.jpg" alt="鄧倫" class="image">
        
        <p class="quote">
            「不管是在密室裡解謎的你，還是現實中努力的你，<br>
            那些帶給我們的快樂，永遠不會被抹滅。」
        </p>

        <div class="counter">應援總量：<span id="countDisplay">0</span></div>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="請輸入 Gmail 帳號 (需含 @gmail.com)">
        </div>
        
        <div class="message">無論如何，我永遠支持你！</div>
        
        <br>
        <button class="btn" onclick="cheer()">點擊發送應援能量</button>
        
    </div>

    <script>
        // 1. 從本地儲存讀取總應援數
        let totalCount = parseInt(localStorage.getItem('supportCount')) || 0;
        document.getElementById("countDisplay").innerText = totalCount;

        // 【關鍵改變：黑名單陣列】
        // 這個變數會存在於記憶體中，只要不重新整理網頁，它就會記住誰點過了
        let votedEmails = [];

        function cheer() {
            const emailField = document.getElementById("emailInput");
            const email = emailField.value.trim().toLowerCase(); // 轉小寫並去空格，增加判斷準確度
            const card = document.getElementById("mainCard");

            // 檢查是否為 Gmail
            if (!email.includes("@gmail.com")) {
                alert("請先輸入正確的 Gmail 帳號喔！");
                return;
            }

            // 【核心邏輯：檢查此帳號是否在此次開啟期間已應援過】
            if (votedEmails.includes(email)) {
                alert("這個帳號在此次連線期間已經應援過了喔！謝謝你的愛心！");
                return;
            }

            // 通過檢查，執行應援動作
            totalCount++;
            document.getElementById("countDisplay").innerText = totalCount;
            localStorage.setItem('supportCount', totalCount);

            // 將此帳號加入「已投票名單」
            votedEmails.push(email);

            // 震動效果
            card.classList.add("shaking");
            setTimeout(() => {
                card.classList.remove("shaking");
            }, 150);

            // 清空輸入框並提示成功
            emailField.value = ""; 
            alert("應援成功！感謝支持！");
        }
    </script>

</body>
</html>
